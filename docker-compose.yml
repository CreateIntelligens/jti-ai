services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./.env:/app/.env
      - ./data:/app/data
      - ./logs:/app/logs
      - ./data/lancedb:/app/data/lancedb
      - ./.hf_cache:/home/appuser/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    expose:
      - "${PORT:-8008}"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - BACKEND_PORT=${PORT:-8008}
      - TZ=Asia/Taipei
      - HF_HOME=/home/appuser/.cache/huggingface
    command: uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8008} --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${PORT:-8008}/health')"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${PORT:-8008}:${PORT:-8008}"
    environment:
      - VITE_API_URL=http://localhost:${PORT:-8008}
      - VITE_PUBLIC_ALLOWED_PAGES=${VITE_PUBLIC_ALLOWED_PAGES:-jti}
      - VITE_PUBLIC_RESTRICTED_HOSTS=${VITE_PUBLIC_RESTRICTED_HOSTS:-}
      - PORT=${PORT:-8008}
      - TZ=Asia/Taipei
    restart: unless-stopped
