services:
  # DocumentDB 連線中繼：自動判斷 VPC 內(socat 直連) / VPC 外(autossh 經跳板)。
  # backend 一律連 db-tunnel:27017，無需區分部署環境。詳見 docker/tunnel/README.md
  db-tunnel:
    build:
      context: .
      dockerfile: docker/tunnel/Dockerfile
    environment:
      - DOCDB_ENDPOINT=${DOCDB_ENDPOINT:-us-west-2-mongodb-cluster.cluster-caep6t8j4kmy.us-west-2.docdb.amazonaws.com}
      - DOCDB_PORT=${DOCDB_PORT:-27017}
      - LISTEN_PORT=27017
      - BASTION_HOST=${BASTION_HOST:-52.12.0.227}
      - BASTION_USER=${BASTION_USER:-ec2-user}
      - BASTION_KEY=/id_rsa
      - TZ=Asia/Taipei
    volumes:
      # VPC 外才會用到；VPC 內 socat 直連不讀這些。檔案由 .gitignore 排除。
      - ./docker/tunnel/bastion_key:/id_rsa:ro
      - ./docker/tunnel/known_hosts:/known_hosts:ro
    expose:
      - "27017"
    # 端到端探活（見 healthcheck.sh）：依模式真正驗證後端隧道可達，
    # 取代舊版只看 localhost port listen 的健康假象（隧道卡住卻仍 healthy）。
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    # LanceDB opens many file descriptors per write; the 1024 default is too low
    # for boot-time backfill across jti/hciot/general stores (hit "Too many open
    # files"). 65536 is the standard nofile limit for DB/retrieval services.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./scripts:/app/scripts
      - ./.env:/app/.env
      - ./data:/app/data
      - ./logs:/app/logs
      - ./docker:/app/docker:ro
      - ./.hf_cache:/home/appuser/.cache/huggingface
      # DocumentDB TLS CA（連 DocumentDB 時 MONGODB_URI 以 tlsCAFile 指向此路徑）
      - ./global-bundle.pem:/app/global-bundle.pem:ro
    depends_on:
      db-tunnel:
        # service_started(非 healthy):tunnel 連不上主庫時 backend 仍啟動,
        # 由 app 端 resolve_mongodb_uri() fallback 至 Atlas 備援。
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    expose:
      - "${PORT:-8008}"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - MODE=${MODE:-prod}
      - BACKEND_PORT=${PORT:-8008}
      - TZ=Asia/Taipei
      - HF_HOME=/home/appuser/.cache/huggingface
    # 不帶 command：由 entrypoint 依 MODE 推導 uvicorn 參數（dev=--reload / prod=--workers 2）
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${PORT:-8008}/health')"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    restart: unless-stopped

  frontend:
    # tini 作為 PID 1，正確把 SIGTERM 轉發給 Vite/Node 子進程，
    # 讓 docker compose down 能乾淨停止（否則 Node 收不到 SIGTERM，需等 10s timeout 後被 SIGKILL）。
    init: true
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${PORT:-8008}:${PORT:-8008}"
    environment:
      - VITE_API_URL=http://localhost:${PORT:-8008}
      - VITE_PUBLIC_ALLOWED_PAGES=${VITE_PUBLIC_ALLOWED_PAGES:-jti}
      - VITE_PUBLIC_RESTRICTED_HOSTS=${VITE_PUBLIC_RESTRICTED_HOSTS:-}
      - VITE_HCIOT_EXTERNAL_LINK_URL=${VITE_HCIOT_EXTERNAL_LINK_URL:-}
      - PORT=${PORT:-8008}
      - TZ=Asia/Taipei
    restart: unless-stopped
